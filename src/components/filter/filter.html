<form class="filter-form">
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>{{ 'todos.userId' | translate }}</mat-label>
    <mat-select
      id="filter-user-id"
      [formField]="filterForm.userId"
    >
      <mat-option [value]="0">—</mat-option>
      @for (option of numberOptions; track option) {
        <mat-option [value]="option">{{ option }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="filter-field filter-field--text">
    <mat-label>{{ 'todos.title' | translate }}</mat-label>
    <input
      matInput
      type="search"
      id="filter-title"
      [formField]="filterForm.title"
    />
  </mat-form-field>
</form>
