server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html index.htm;
 
    # Configuración para PWA - cache del manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/manifest+json";
    }
 
    # Service Worker - no cachear
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }
 
    # Assets estáticos con caché largo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
 
    # Angular routing - servir index.html para todas las rutas desconocidas
    location / {
        # Primero intenta servir el archivo tal cual
        # Si no existe y no es un archivo, sirve index.html
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.html break;
        }
    }
 
    # Denegar acceso a archivos sensibles
    location ~ /\. {
        deny all;
    }
}